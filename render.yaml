# ============================================================
# Render Blueprint — Luvaria Ulisses 2026
# Deploy: https://render.com/docs/blueprint-spec
# ============================================================
#
# Instruções rápidas:
# 1. Fork este repo no GitHub
# 2. No Render, crie um "Blueprint" e conecte o repo
# 3. O Render criará PostgreSQL + Backend automaticamente
# 4. Configure as variáveis marcadas com [OBRIGATÓRIO] no painel
# 5. O Frontend (Next.js) deve ser deployado separadamente na Vercel

services:
  # ============================================================
  # BACKEND — Node.js (Docker)
  # ============================================================
  - type: web
    name: luvaria-backend
    runtime: docker
    repo: https://github.com/SEU_USUARIO/luvaria-ulisses-2026-qwen
    branch: main
    dockerfilePath: ./backend/Dockerfile.render
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      # --- Geradas automaticamente pelo Blueprint ---
      - key: DATABASE_URL
        value: ""

      # --- Configurar MANUALMENTE no painel do Render ---
      - key: NODE_ENV
        value: production

      - key: JWT_SECRET
        value: ""
        # [OBRIGATÓRIO] Gere com: openssl rand -hex 32

      - key: JWT_REFRESH_SECRET
        value: ""
        # [OBRIGATÓRIO] Gere com: openssl rand -hex 32

      - key: JWT_EXPIRES_IN
        value: 15m

      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      - key: REDIS_URL
        value: ""
        # [OBRIGATÓRIO] Upstash: copie a URL de conexão do painel

      - key: AWS_ACCESS_KEY_ID
        value: ""
        # [OBRIGATÓRIO] AWS IAM User com acesso ao S3

      - key: AWS_SECRET_ACCESS_KEY
        value: ""
        # [OBRIGATÓRIO] AWS IAM User secret key

      - key: AWS_REGION
        value: us-east-1

      - key: AWS_S3_BUCKET
        value: luvaria-ulisses

      - key: WEBHOOK_SECRET_N8N
        value: ""
        # [OBRIGATÓRIO] Gere com: openssl rand -hex 32

      - key: N8N_WEBHOOK_URL
        value: ""
        # [OPCIONAL] URL do webhook do n8n (ex: https://n8n.seudominio.com/webhook/luvaria)

      - key: FRONTEND_URL
        value: ""
        # [OBRIGATÓRIO] URL do frontend na Vercel (ex: https://luvaria-ulisses.vercel.app)

      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"

      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"

    # Configurações do Docker
    dockerCommand: npx prisma migrate deploy && node dist/server.js

